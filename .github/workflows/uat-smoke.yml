name: UAT Canonical Smoke

on:
  workflow_run:
    workflows: ["Sync to Hugging Face Hub"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref/SHA to validate (default: main)"
        required: false
        type: string
      base_url:
        description: "Frontend base URL override"
        required: false
        type: string
      api_base_url:
        description: "Backend base URL override"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: uat-smoke-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

env:
  UAT_BASE_URL: ${{ github.event.inputs.base_url || 'https://scholar-flow-q1yw.vercel.app' }}
  UAT_API_BASE_URL: ${{ github.event.inputs.api_base_url || 'https://louisshawn-scholarflow-api.hf.space' }}

jobs:
  platform-gates:
    if: >
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || (github.event.inputs.ref || 'main') }}

      - name: Capture expected backend deploy SHA
        run: echo "EXPECTED_DEPLOY_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Verify required secrets
        run: |
          test -n "${{ secrets.ADMIN_API_KEY }}"
          test -n "${{ secrets.SUPABASE_ACCESS_TOKEN }}"
          test -n "${{ secrets.SUPABASE_DB_PASSWORD }}"
          test -n "${{ secrets.SMOKE_ADMIN_EMAIL }}"
          test -n "${{ secrets.SMOKE_ADMIN_PASSWORD }}"

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check linked Supabase migration parity
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: mmvulyrfsorqdpdrzbkd
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: bash scripts/ci/check-supabase-linked-parity.sh

      - name: Check backend platform readiness
        env:
          UAT_API_BASE_URL: ${{ env.UAT_API_BASE_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          EXPECTED_DEPLOY_SHA: ${{ env.EXPECTED_DEPLOY_SHA }}
        run: bash scripts/ci/check-platform-readiness.sh --expected-deploy-sha "${EXPECTED_DEPLOY_SHA}"

  frontend-smoke:
    needs: platform-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || (github.event.inputs.ref || 'main') }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install --frozen-lockfile

      - name: Document frontend smoke scope
        run: |
          {
            echo "## Frontend Smoke Scope"
            echo
            echo "- This workflow validates the canonical UAT frontend URL."
            echo "- It does **not** prove Vercel commit SHA parity."
            echo "- Exact frontend deployment binding requires a future Vercel deployment hook / metadata gate."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for deployed frontend
        run: |
          set -euo pipefail
          for attempt in $(seq 1 24); do
            status="$(curl -s -o /dev/null -w '%{http_code}' "${UAT_BASE_URL}/login" || true)"
            echo "[uat-smoke] attempt=${attempt} status=${status}"
            if [[ "${status}" == "200" ]]; then
              exit 0
            fi
            sleep 10
          done
          echo "[uat-smoke] frontend did not become ready in time" >&2
          exit 1

      - name: Install Playwright browser
        working-directory: ./frontend
        run: bunx playwright install --with-deps chromium

      - name: Run deployed smoke tests
        working-directory: ./frontend
        env:
          CI: "1"
          PLAYWRIGHT_BASE_URL: ${{ env.UAT_BASE_URL }}
          PLAYWRIGHT_WEB_SERVER: "0"
          SMOKE_ADMIN_EMAIL: ${{ secrets.SMOKE_ADMIN_EMAIL }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
          SMOKE_PUBLISHED_ARTICLE_ID: ${{ vars.SMOKE_PUBLISHED_ARTICLE_ID }}
        run: bunx playwright test tests/e2e/specs/deployed_smoke.spec.ts --project=chromium --reporter=github,html

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
          retention-days: 14
